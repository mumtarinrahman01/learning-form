<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Form to Fill</title>
    <style>
        label{
            display: block;
            margin-bottom: 20px;

        }
    </style>
</head>
<body>
    <header>

    </header>
    <main>
        <section>
            <h2>Please fill up the form</h2>
            <form>
                <label for="">Your Name:
                    <input type="text" placeholder="PLEASE WRITE YOUR NAME">
                </label>
                 <label for="">Your age:
                    <input type="date" placeholder="__/__/__">
                </label>
                 <label for="">E-mail:
                    <input type="email" placeholder="ENTER YOUR E-MAIL ADDRESS">
                </label>
                 <label for="">Address:
                    <input type="text" placeholder="PLEASE WRITE YOUR ADDRESS">
                </label>
                 <label for="">Number:
                    <input type="number" placeholder="PLEASE WRITE YOUR NUMBER">
                </label>
                <fieldset>
                    <legend>What do you need:
                        Pitha
                    </legend>
                    <label for="Chitoy">
                        <input type="radio" name="Pitha" id="Chitoy">Chitoy
                    </label>
                    <label for="vapa">
                        <input type="radio" name="Pitha" id="vapa">Vapa
                    </label>
                    <label for="Puri">
                        <input type="radio" name="Pitha" id="Puri">Puri
                    </label>
                    <label for="Ros Malai">
                        <input type="radio" name="Pitha" id="Rosh Malai">Rosh Malai
                    </label>
                </fieldset>
                <fieldset>
                    <legend>What do you need:
                        Vorta
                    </legend>
                    <label for="shorisha">
                        <input type="checkbox" name="" id="shorisha">Shorisha
                    </label>
                    <label for="Dhonia">
                        <input type="checkbox" name="" id="dhonia">Dhonia
                    </label>
                    <label for="Shrimp">
                        <input type="checkbox" name="" id="shrimp">Shrimp
                    </label>
                    <label for="Shutki">
                        <input type="checkbox" name="" id="Shutki">Shutki
                    </label>
                </fieldset>
            </form>
        </section>
    </main>
</body>
</html>

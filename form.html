<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Form to Fill</title>
    <style>
        label{
            display: block;
            margin-bottom: 20px;

        }
    </style>
</head>
<body>
    <header>

    </header>
    <main>
        <section>
            <h2>Please fill up the form</h2>
            <form>
                <label for="">Your Name:
                    <input type="text" placeholder="PLEASE WRITE YOUR NAME">
                </label>
                 <label for="">Your age:
                    <input type="date" placeholder="__/__/__">
                </label>
                 <label for="">E-mail:
                    <input type="email" placeholder="ENTER YOUR E-MAIL ADDRESS">
                </label>
                 <label for="">Address:
                    <input type="text" placeholder="PLEASE WRITE YOUR ADDRESS">
                </label>
                 <label for="">Number:
                    <input type="number" placeholder="PLEASE WRITE YOUR NUMBER">
                </label>
            </form>
        </section>
    </main>
</body>
</html>
